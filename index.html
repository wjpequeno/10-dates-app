<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Dates - Conexões</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { --bg-color: #fcf9f2; --primary-color: #d35400; --secondary-color: #e67e22; --text-color: #333; --card-bg: #fff; --light-gray: #ecf0f1; }
        body { font-family: 'Georgia', serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1, h2, h3 { color: var(--primary-color); text-align: center; }
        #app-container { width: 100%; max-width: 450px; }
        .screen { display: none; flex-direction: column; width: 100%; animation: fadeIn 0.4s; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 15px; margin: 8px 0; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; transition: background 0.3s; }
        .btn:hover { background-color: var(--secondary-color); }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: inherit;}
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .reveal-box { background-color: #fff8f3; border-left: 4px solid var(--primary-color); padding: 15px; margin-top: 15px; text-align: left; border-radius: 4px;}
        .reveal-name { font-weight: bold; font-size: 12px; color: var(--primary-color); text-transform: uppercase; margin-bottom: 5px;}
    </style>
</head>
<body>

    <div id="app-container">
        
        <div id="screen-login" class="screen active">
            <h1>10 Dates</h1>
            <p style="text-align: center; color: gray; font-size: 14px;">Conecte os celulares para começar</p>
            
            <div class="card">
                <div class="input-group">
                    <label>Seu Nome</label>
                    <input type="text" id="my-name" placeholder="Como quer ser chamado?">
                </div>
                <button class="btn" onclick="createRoom()">Criar Nova Sala</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
                <div class="input-group">
                    <label>Código da Sala (para entrar)</label>
                    <input type="text" id="room-code-input" placeholder="Ex: A4B2" style="text-transform: uppercase;">
                </div>
                <button class="btn" style="background-color: #2c3e50;" onclick="joinRoom()">Entrar em Sala Existente</button>
            </div>
        </div>

        <div id="screen-dash" class="screen">
            <div class="card" style="border: 2px dashed var(--primary-color);">
                <h3>Código da Sala: <span id="display-room-code" style="font-size: 30px;"></span></h3>
                <p id="room-status" style="color: gray;">Aguardando a outra pessoa entrar...</p>
            </div>
            <div id="themes-container" style="display: none;">
                <h3>Escolha o Tema de Hoje</h3>
                <div id="theme-list"></div>
            </div>
        </div>

        <div id="screen-question" class="screen">
            <div class="card">
                <p id="q-theme" style="font-size: 12px; color: gray; text-transform: uppercase; margin: 0;">Tema</p>
                <h2 id="q-text" style="font-size: 20px; margin-top: 5px;">Pergunta...</h2>
                
                <div id="answer-area">
                    <div class="input-group" style="text-align: left; margin-top: 20px;">
                        <label>Sua resposta (em segredo):</label>
                        <textarea id="my-answer" rows="4" placeholder="Escreva o que sente..."></textarea>
                    </div>
                    <button id="btn-submit-answer" class="btn" onclick="submitAnswer()">Pronto, terminei!</button>
                </div>

                <div id="waiting-area" style="display: none; padding: 20px 0;">
                    <h3 style="color: #2c3e50;">Resposta salva!</h3>
                    <p>Aguardando a outra pessoa terminar de escrever...</p>
                </div>
            </div>
        </div>

        <div id="screen-reveal" class="screen">
            <div class="card">
                <h2 style="font-size: 18px; color: gray;">A Pergunta:</h2>
                <p id="rev-q-text" style="font-style: italic;"></p>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
                
                <div class="reveal-box">
                    <div class="reveal-name" id="rev-name-1">Pessoa 1</div>
                    <div id="rev-ans-1">Resposta...</div>
                </div>

                <div class="reveal-box">
                    <div class="reveal-name" id="rev-name-2">Pessoa 2</div>
                    <div id="rev-ans-2">Resposta...</div>
                </div>

                <button class="btn" style="margin-top: 20px;" onclick="nextQuestion()">Próxima Pergunta / Voltar aos Temas</button>
            </div>
        </div>

    </div>

    <script>
        // --- SUA CONFIGURAÇÃO DO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCflvEaj_2rQktvYkhnLKvw4mGJRjDh3Lw",
            authDomain: "dates-app-b6816.firebaseapp.com",
            databaseURL: "https://dates-app-b6816-default-rtdb.firebaseio.com",
            projectId: "dates-app-b6816",
            storageBucket: "dates-app-b6816.firebasestorage.app",
            messagingSenderId: "530560332056",
            appId: "1:530560332056:web:b9abe1ccc5f6c98f032e6d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- DADOS DO LIVRO ---
        const themesData = [
            { id: 0, title: "Sobre você e sobre mim", questions: [ "Se você só pudesse escolher 3 coisas para comer para o resto da sua vida, quais seriam?", "Como você descreveria a sua personalidade?", "Falem sobre 5 qualidades que vocês gostam um no outro.", "Qual é o seu filme, sua série, sua música e livro favoritos?", "Quais são seus hobbies favoritos?", "Como você gosta de relaxar e recarregar suas energias depois de um dia difícil?", "Se você pudesse descrever um momento de autodescoberta significativo em sua vida, qual seria? E o que aprendeu sobre você?", "O que mais te inspira na vida? Existem filosofias ou ideias que moldam sua maneira de olhar o mundo?", "Quais coisas você quer fazer antes de morrer?"] },
            { id: 1, title: "Metas, sonhos e futuro", questions: [ "Quais são os seus sonhos para o futuro?", "Como você imagina a sua vida no próximo ano? E daqui a 5 anos?", "Se pudesse escolher uma meta ou um sonho para começar a colocar em prática agora, qual seria?", "O que você individualmente pode fazer para conseguir se aproximar dos seus objetivos futuros?", "O que posso fazer para te apoiar na realização de seus sonhos individuais?", "Quais são as experiências que vocês gostariam de compartilhar ao longo dos próximos anos?", "Quais são os obstáculos que você acredita que pode ter ao buscar suas metas? Como enfrentá-los juntos?", "O que vocês podem fazer para nutrir a paixão e o entusiasmo em relação aos seus sonhos compartilhados?", "Qual o legado que vocês querem deixar como casal?"] },
            { id: 2, title: "Sexo e intimidade", questions: [ "O que você acha que é mais importante para criar uma conexão emocional e física forte durante o sexo?", "Quais são os rituais ou hábitos que podemos colocar na nossa rotina para aumentar a intimidade e a conexão sexual?", "Quais são as suas expectativas em relação à frequência e à qualidade do sexo em seu relacionamento?", "O que te faz perder a conexão sexual e quais os caminhos para recuperá-la?", "Existe alguma insegurança, trauma ou limite sexual que você gostaria de compartilhar?", "Existem desejos ou fantasias que você gostaria de explorar comigo?", "O que eu faço na hora do sexo que você mais gosta?", "O que aumenta ainda mais o seu prazer quando estamos transando?", "Como vocês podem manter a paixão e a conexão sexual ao longo do tempo em seu relacionamento?"] },
            { id: 3, title: "Trabalho e dinheiro", questions: [ "O que é sucesso profissional para você?", "Quais as suas expectativas financeiras?", "Como você se sente em relação ao equilíbrio entre a minha vida pessoal e o meu trabalho?", "Quais são seus maiores medos em relação a sua carreira?", "Existem preocupações financeiras que você sente que precisamos abordar como casal?", "Existem hábitos de consumo que você gostaria que mudássemos?", "Como podemos tornar nossas metas financeiras um projeto compartilhado e motivador para ambos?", "Há algum medo ou insegurança relacionado ao dinheiro que você gostaria de discutir?", "De que maneira a estabilidade ou instabilidade financeira impacta nosso planejamento para o futuro?"] },
            { id: 4, title: "Comunicação e conflitos", questions: [ "Como você prefere discutir assuntos importantes: em conversas espontâneas ou planejadas?", "Como você se sente sobre a maneira como resolvemos nossos últimos desentendimentos?", "Como você se sente em relação ao uso de humor durante nossas discussões?", "Existe algum tema que você sente que evitamos discutir, mas sobre o qual precisamos falar?", "Existe algo que eu faço durante os conflitos que te magoa ou impede a resolução?", "Você acha que nossos estilos de comunicação são compatíveis? Como podemos melhorar?", "Como você gostaria que eu demonstrasse apoio durante momentos de estresse ou conflito?", "Existe algo que eu disse em um conflito anterior que você gostaria de revisitar para esclarecer ou corrigir?", "Quais estratégias podemos adotar para evitar mal-entendidos nas nossas conversas?"] },
            { id: 5, title: "Tempo, limites e compatibilidade", questions: [ "Existe algo que você nunca tentou antes, mas gostaria de experimentar comigo?", "Existem limites específicos que você sente que precisamos estabelecer ou ajustar?", "Existem gostos ou preferências que você sacrificou pelo nosso relacionamento? Como se sente a respeito disso?", "Como podemos criar novas tradições legais na nossa rotina?", "Você acha que nossos amigos e família respeitam os limites do nosso relacionamento? Como podemos melhorar isso?", "Como você avalia a importância de datas comemorativas e aniversários em nosso relacionamento?", "Existem atividades ou hobbies que você prefere fazer sozinho?", "Como você se sente sobre a quantidade de tempo que passamos juntos atualmente? Como melhorar?", "Existem atividades externas ou grupos nos quais poderíamos nos envolver, juntos, para expandir o nosso círculo social?"] },
            { id: 6, title: "Saúde e estilo de vida", questions: [ "Como você descreveria seu estilo de vida atual e como ele influencia nossa relação?", "Existem hábitos de saúde que você gostaria que mudássemos juntos?", "Como você acha que o consumo de álcool, tabaco ou outras substâncias afeta nossa relação?", "Você se sente confortável discutindo suas preocupações de saúde comigo?", "Você se sente apoiado por mim em suas escolhas de estilo de vida? Como posso oferecer mais suporte?", "Que atividades de bem-estar você gostaria de experimentar comigo?", "Como podemos motivar um ao outro a manter um compromisso com um estilo de vida saudável?", "Existe alguma mudança em nosso ambiente doméstico que poderia nos ajudar a viver de maneira mais saudável?", "Como a espiritualidade influencia seu bem-estar pessoal e nossa vida como casal?"] },
            { id: 7, title: "Respeito e compromisso", questions: [ "Para você, quais são os principais acordos que temos dentro do nosso relacionamento?", "De que maneiras você se sente respeitado e valorizado por mim? Como posso melhorar?", "Quais ações você considera importantes para demonstrar respeito pelo espaço e tempo um do outro?", "Como eu posso demonstrar compromisso com nosso relacionamento no dia a dia?", "Você se sente respeitado nas opiniões que divergimos? Como podemos manter o respeito nessas diferenças?", "Como você se sente em relação aos acordos que fizemos dentro do nosso relacionamento até agora?", "Você acha que há um equilíbrio saudável entre nosso compromisso um com o outro e nossa independência pessoal?", "Você se sente seguro para expressar quando algo não está respeitando seus limites ou expectativas?", "O que te faria sentir que os nossos acordos estão sendo quebrados?"] },
            { id: 8, title: "Nossa história", questions: [ "Qual foi o momento em que você sentiu que nossa conexão estava mais forte do que nunca?", "Quando foi que você percebeu que estava apaixonado por mim?", "Existem momentos específicos em nossa história que você considera como pontos de virada para sermos o que somos hoje?", "Se pudéssemos voltar no tempo para reviver uma experiência que compartilhamos juntos, qual você escolheria e por quê?", "Qual é a lembrança mais engraçada ou descontraída que você tem de nós dois juntos?", "Se você fosse contar a nossa história para um desconhecido, como contaria?", "Se pudéssemos extrair uma lição valiosa de nossa história, qual seria?", "Se você pudesse escolher qualquer lugar do mundo para me levar, qual seria e por quê?", "Quais são as coisas que a gente precisa prometer nunca fazer um ao outro?"] },
            { id: 9, title: "Monogamia e Não Monogamia", questions: [ "O que exclusividade afetiva e sexual significam para você na prática?", "Quais são os seus limites inegociáveis quando se trata de se relacionar ou interagir com outras pessoas?", "Você já teve experiências fora do modelo monogâmico tradicional? Se sim, o que aprendeu com elas?", "O que faria você sentir que a confiança ou os nossos acordos foram quebrados?", "Como podemos garantir que ambos se sintam seguros e validados, independentemente do formato de relacionamento?", "Como você costuma lidar com o ciúme quando ele surge e como prefere ser acolhido nesse momento?", "Você acredita que o formato de um relacionamento deve ser fixo ou pode evoluir com o tempo?", "Como podemos comunicar atração ou interesse por outras pessoas de uma forma construtiva?", "Qual é o seu maior medo e o seu maior desejo ao pensar nas estruturas do nosso relacionamento?"] }
        ];

        // --- LÓGICA DO MULTIPLAYER ---
        let myName = "";
        let roomCode = "";
        let isPlayer1 = false;

        function generateCode() { return Math.random().toString(36).substring(2, 6).toUpperCase(); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createRoom() {
            myName = document.getElementById('my-name').value;
            if(!myName) return alert("Digite seu nome!");
            
            roomCode = generateCode();
            isPlayer1 = true;
            
            db.ref('rooms/' + roomCode).set({
                player1: myName, player2: null, state: 'lobby', currentTheme: -1, currentQuestion: -1, answers: { p1: "", p2: "" }
            });

            document.getElementById('display-room-code').innerText = roomCode;
            showScreen('screen-dash');
            listenToRoom();
        }

        function joinRoom() {
            myName = document.getElementById('my-name').value;
            roomCode = document.getElementById('room-code-input').value.toUpperCase();
            if(!myName || !roomCode) return alert("Preencha nome e código!");

            isPlayer1 = false;
            
            db.ref('rooms/' + roomCode).update({ player2: myName });

            document.getElementById('display-room-code').innerText = roomCode;
            showScreen('screen-dash');
            listenToRoom();
        }

        function listenToRoom() {
            db.ref('rooms/' + roomCode).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                if(data.player1 && data.player2 && data.state === 'lobby') {
                    document.getElementById('room-status').innerText = `${data.player1} e ${data.player2} conectados!`;
                    renderThemes();
                    document.getElementById('themes-container').style.display = 'block';
                    showScreen('screen-dash');
                }

                if(data.state === 'answering') {
                    document.getElementById('q-theme').innerText = themesData[data.currentTheme].title;
                    document.getElementById('q-text').innerText = themesData[data.currentTheme].questions[data.currentQuestion];
                    
                    document.getElementById('my-answer').value = "";
                    document.getElementById('answer-area').style.display = 'block';
                    document.getElementById('waiting-area').style.display = 'none';
                    
                    showScreen('screen-question');
                }

                if(data.state === 'reveal') {
                    document.getElementById('rev-q-text').innerText = themesData[data.currentTheme].questions[data.currentQuestion];
                    document.getElementById('rev-name-1').innerText = data.player1;
                    document.getElementById('rev-ans-1').innerText = data.answers.p1;
                    document.getElementById('rev-name-2').innerText = data.player2;
                    document.getElementById('rev-ans-2').innerText = data.answers.p2;
                    showScreen('screen-reveal');
                }
            });
        }

        function renderThemes() {
            const list = document.getElementById('theme-list');
            list.innerHTML = '';
            themesData.forEach((theme, index) => {
                list.innerHTML += `<button class="btn btn-outline" onclick="selectTheme(${index})">${theme.title}</button>`;
            });
        }

        function selectTheme(index) {
            db.ref('rooms/' + roomCode).update({ state: 'answering', currentTheme: index, currentQuestion: 0, answers: { p1: "", p2: "" } });
        }

        function submitAnswer() {
            let answerText = document.getElementById('my-answer').value;
            if(!answerText) return alert("Escreva algo!");

            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';

            let updateObj = {};
            if(isPlayer1) updateObj['answers/p1'] = answerText;
            else updateObj['answers/p2'] = answerText;

            db.ref('rooms/' + roomCode).update(updateObj).then(() => {
                db.ref('rooms/' + roomCode).once('value').then(snap => {
                    let d = snap.val();
                    if(d.answers.p1 !== "" && d.answers.p2 !== "") {
                        db.ref('rooms/' + roomCode).update({ state: 'reveal' });
                    }
                });
            });
        }

        function nextQuestion() {
            db.ref('rooms/' + roomCode).once('value').then(snap => {
                let d = snap.val();
                let nextQ = d.currentQuestion + 1;
                
                if(nextQ < themesData[d.currentTheme].questions.length) {
                    db.ref('rooms/' + roomCode).update({ state: 'answering', currentQuestion: nextQ, answers: { p1: "", p2: "" } });
                } else {
                    db.ref('rooms/' + roomCode).update({ state: 'lobby' });
                }
            });
        }
    </script>
</body>
</html>
